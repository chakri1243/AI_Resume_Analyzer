{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            Resume Builder
        </h2>

        <form action="/generate_resume" method="POST">

            <div class="mb-3">
                <label>Full Name</label>
                <input type="text"
                       name="name"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="text"
                       name="phone"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>LinkedIn</label>
                <input type="text"
                       name="linkedin"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>GitHub</label>
                <input type="text"
                       name="github"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Education</label>
                <textarea name="education"
                          class="form-control"
                          rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label>Skills</label>
                <textarea name="skills"
                          class="form-control"
                          rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label>Projects</label>
                <textarea name="projects"
                          class="form-control"
                          rows="5"></textarea>
            </div>

            <div class="mb-3">
                <label>Experience</label>
                <textarea name="experience"
                          class="form-control"
                          rows="5"></textarea>
            </div>

            <div class="mb-3">
                <label>Certifications</label>
                <textarea name="certifications"
                          class="form-control"
                          rows="4"></textarea>
            </div>

            <div class="mb-3">

                <label>
                    Select Template
                </label>

                <select
                    name="template"
                    class="form-control">

                    <option value="modern">
                        Modern Template
                    </option>

                    <option value="professional">
                        Professional Template
                    </option>

                    <option value="minimal">
                        Minimal Template
                    </option>

                    <option value="fresher">
                        Fresher Template
                    </option>

                </select>

            </div>

            <button
                class="btn btn-primary">

                Generate Resume

            </button>

        </form>

    </div>

</div>

{% endblock %}
