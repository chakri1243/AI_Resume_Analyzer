<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>
        AI Resume Analyzer
    </title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(
                135deg,
                #f5f7fa,
                #c3cfe2
            );
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            box-shadow: 0px 2px 15px rgba(
                0,
                0,
                0,
                0.1
            );
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 24px;
        }

        .card {
            border: none;
            border-radius: 20px;
        }

        .btn {
            border-radius: 10px;
            font-weight: 500;
        }

        .footer {
            margin-top: auto;
            background: #212529;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .footer a {
            color: #0dcaf0;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .page-container {
            flex: 1;
            padding-top: 40px;
            padding-bottom: 40px;
        }

    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand"
               href="/">

                <i class="fa-solid fa-file-lines"></i>
                AI Resume Analyzer

            </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div
                class="collapse navbar-collapse"
                id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    {% if session.user_id %}

                        <li class="nav-item">
                            <a class="nav-link"
                               href="/dashboard">

                                <i class="fa-solid fa-house"></i>
                                Dashboard

                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link"
                               href="/upload">

                                <i class="fa-solid fa-upload"></i>
                                Upload

                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link"
                               href="/history">

                                <i class="fa-solid fa-clock-rotate-left"></i>
                                History

                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link"
                               href="/logout">

                                <i class="fa-solid fa-right-from-bracket"></i>
                                Logout

                            </a>
                        </li>

                    {% else %}

                        <li class="nav-item">
                            <a class="nav-link"
                               href="/login">

                                <i class="fa-solid fa-right-to-bracket"></i>
                                Login

                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link"
                               href="/register">

                                <i class="fa-solid fa-user-plus"></i>
                                Register

                            </a>
                        </li>

                    {% endif %}

                </ul>

            </div>

        </div>

    </nav>

    <!-- Main Content -->

    <div class="container page-container">

        {% block content %}
        {% endblock %}

    </div>

    <!-- Footer -->

    <footer class="footer">

        <p class="mb-1">

            © 2026 AI Resume Analyzer

        </p>

        <p>

            Developed by
            <strong>
                Chakrapani Gutta
            </strong>

        </p>

        <p>

            <a href="#">
                <i class="fa-brands fa-github"></i>
                GitHub
            </a>

            |

            <a href="#">
                <i class="fa-brands fa-linkedin"></i>
                LinkedIn
            </a>

        </p>

    </footer>

    <!-- Bootstrap JS -->

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
