{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg p-4">

                <h2 class="text-center mb-4">
                    Create Account
                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Full Name
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            placeholder="Enter your name"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Password
                        </label>

                        <div class="input-group">

                            <input
                                type="password"
                                class="form-control"
                                id="registerPassword"
                                name="password"
                                placeholder="Create password"
                                required>

                            <span
                                class="input-group-text"
                                onclick="toggleRegisterPassword()"
                                style="cursor:pointer;">

                                <i
                                    class="fa-solid fa-eye"
                                    id="registerEye">
                                </i>

                            </span>

                        </div>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success w-100">

                        Register

                    </button>

                </form>

                <hr>

                <p class="text-center">

                    Already have an account?

                    <a href="/login">
                        Login
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

<script>

function toggleRegisterPassword() {

    const password =
        document.getElementById(
            "registerPassword"
        );

    const eye =
        document.getElementById(
            "registerEye"
        );

    if (password.type === "password") {

        password.type = "text";

        eye.classList.remove(
            "fa-eye"
        );

        eye.classList.add(
            "fa-eye-slash"
        );
    }
    else {

        password.type = "password";

        eye.classList.remove(
            "fa-eye-slash"
        );

        eye.classList.add(
            "fa-eye"
        );
    }
}

</script>

{% endblock %}
