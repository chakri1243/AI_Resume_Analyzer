{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow p-4">

            <h2 class="text-center mb-4">
                Create Account
            </h2>

            <form method="POST">

                <div class="mb-3">

                    <label>Name</label>

                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label>Password</label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

                </div>

                <div class="d-grid">

                    <button
                        class="btn btn-success">

                        Register

                    </button>

                </div>

            </form>

            <hr>

            <p class="text-center">

                Already have an account?

                <a href="/login">
                    Login
                </a>

            </p>

        </div>

    </div>

</div>

{% endblock %}
